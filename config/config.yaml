# ==============================================================================
# Configuration Template for Parcel-Level LU Supply Framework
# ==============================================================================
# Copy this file, fill in paths and parameters for your study area,
# and reference it from each pipeline stage.
# ==============================================================================

# --- Study Area & Temporal Scope ---------------------------------------------
study_area:
  name: "GTHA"                          # Human-readable label
  crs: "EPSG:26917"                     # Projected coordinate system (UTM 17N for GTHA)
  bounds_shapefile: null                 # Optional: clip to boundary polygon

temporal:
  start_year: 2015                      # First simulation year
  end_year: 2023                        # Last simulation year
  lag_initialization_years: 2           # Years reserved for lag computation (e.g., 2013-2014)
  interval: "annual"                    # Temporal resolution: "annual" | "quarterly" | "monthly"

# --- Choice Set Definition ---------------------------------------------------
choice_set:
  alternatives:
    - "Retail"
    - "Industrial"
    - "Office"
    - "Mixed"
    - "A_N_O"                            # "All None or Other" (no development / non-target types)
  mixed_use_components:                  # Which single types combine into "Mixed"
    - "Retail"
    - "Industrial"
    - "Office"
  residential_treatment: "absorb_into_ANO"  # Residential projects → A_N_O category

# --- Spatial Resolution & Buffers --------------------------------------------
spatial:
  fundamental_unit: "parcel"            # "parcel" | "block" | "DA" | "TAZ"
  buffer_distances_m: [100, 1000]       # Neighbourhood buffer radii in metres
  default_buffer_m: 1000                # Default for reporting

# --- File Paths (user must populate) ----------------------------------------
paths:
  # Raw inputs
  parcels_shapefile: "data/raw/parcels.shp"
  buildings_csv: "data/raw/buildings.csv"
  zoning_shapefile: "data/raw/zoning_bylaws.shp"
  market_data_csv: "data/raw/market_indicators.csv"
  poi_shapefile: "data/raw/points_of_interest.shp"
  transport_network: "data/raw/transport/"
  census_csv: "data/raw/census_variables.csv"
  satellite_imagery_dir: "data/raw/satellite/"

  # Intermediate outputs
  intermediate_dir: "data/intermediate/"
  permitted_uses: "data/intermediate/permitted_uses.shp"
  cleaned_buildings: "data/intermediate/buildings_cleaned.shp"
  panel_database: "data/intermediate/panel_database.csv"
  feature_matrix: "data/intermediate/feature_matrix.csv"
  active_agents: "data/intermediate/active_agents.csv"

  # Final outputs
  output_dir: "data/output/"
  model_input: "data/output/input_data.csv"         # Fed into Stage 8 (R)
  model_results: "data/output/mxl_model_results.csv"
  model_fit: "data/output/mxl_model_fit_stats.csv"

# --- Zoning Landscape (Stage 2) ---------------------------------------------
zoning:
  unified_taxonomy:
    - "R_LM"          # Residential low/medium density
    - "Apartment"      # Residential high density
    - "Retail"
    - "Industrial"
    - "Office"
    - "Others"         # Open space, institutional, infrastructure, etc.
  hierarchical_ml:
    layer1_super_labels:
      RO: ["R_LM", "Apartment"]                      # Residential-Only
      CM: ["Retail", "Industrial", "Office", "Mixed"] # Commercial or Mixed
      OT: ["Others"]                                   # Other
    layer1_model: "XGBoost"
    layer2_model: "MLP"
    train_test_split: 0.7

# --- Availability Filtering (Stage 6) ---------------------------------------
availability:
  saturation_classifier:
    model_type: "TensorFlow_Keras"
    train_test_split: 0.8
    manual_labels_count: 4000           # Minimum hand-labelled training parcels
    target_accuracy: 0.70
  zoning_filter:
    require_any_commercial: true        # Parcel must permit >= 1 of Retail/Industrial/Office

# --- Market Disaggregation (Stage 7) ----------------------------------------
market:
  spatial_interaction:
    decay_function: "inverse_distance_squared"  # l_ik^(-2)
    distance_metric: "euclidean"
  variables:
    - "rent_per_sqft"
    - "sale_price_per_sqft"
    - "cap_rate"
    - "vacancy_rate"
    - "operating_cost"
    - "num_leasing_deals"
    - "num_sale_listings"
    - "total_sales_volume"

# --- Mixed Logit Estimation (Stage 8) ---------------------------------------
model:
  type: "panel_mixed_logit"
  random_coefficients:                  # Variables with random (normally distributed) parameters
    - "C_1Y"
    - "Rent_Adj"
    - "Cap_Rate_CHG"
    - "Lease_Deal_CHG"
    - "SalePrice_CHG"
  random_distribution: "normal"
  halton_draws: 200
  panel: true
  significance_threshold: 0.05         # 95% CI for variable retention
  significance_lower_bound: 0.10       # 90% CI as absolute floor

# --- Validation (Stage 9) ---------------------------------------------------
validation:
  mcfadden_r2_threshold: 0.20          # Minimum acceptable Rho-squared
  simulation_years: null                # null = use full study period
  market_share_comparison: true
  temporal_lag_sensitivity: [1, 3, 5]   # Lag durations (years) for decay analysis
